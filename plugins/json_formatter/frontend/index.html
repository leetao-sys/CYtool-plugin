<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSON 格式化</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2937; background: #f8fafc; }
    main { padding: 20px; display: grid; gap: 14px; }
    textarea { width: 100%; min-height: 220px; box-sizing: border-box; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: Consolas, monospace; resize: vertical; }
    button { width: fit-content; border: 0; border-radius: 8px; background: #2563eb; color: white; padding: 9px 14px; cursor: pointer; }
    pre { margin: 0; padding: 14px; border-radius: 8px; background: #0f172a; color: #e2e8f0; overflow: auto; min-height: 220px; }
    .error { color: #b91c1c; background: #fee2e2; border: 1px solid #fecaca; padding: 10px; border-radius: 8px; display: none; }
    .key { color: #93c5fd; } .string { color: #86efac; } .number { color: #fcd34d; } .bool { color: #f0abfc; } .null { color: #fca5a5; }
  </style>
</head>
<body>
  <main>
    <h2>JSON 格式化</h2>
    <textarea id="input" placeholder="粘贴 JSON 字符串"></textarea>
    <button id="format">格式化</button>
    <div id="error" class="error"></div>
    <pre id="output"></pre>
  </main>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const error = document.getElementById('error');
    function escapeHtml(value) {
      return value.replace(/[&<>]/g, ch => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[ch]));
    }
    function colorize(json) {
      return escapeHtml(json).replace(/("(?:\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\btrue\b|\bfalse\b|\bnull\b|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g, token => {
        let cls = 'number';
        if (token.endsWith(':')) cls = 'key';
        else if (token.startsWith('"')) cls = 'string';
        else if (token === 'true' || token === 'false') cls = 'bool';
        else if (token === 'null') cls = 'null';
        return `<span class="${cls}">${token}</span>`;
      });
    }
    document.getElementById('format').addEventListener('click', () => {
      error.style.display = 'none';
      output.innerHTML = '';
      try {
        const parsed = JSON.parse(input.value);
        output.innerHTML = colorize(JSON.stringify(parsed, null, 2));
      } catch (err) {
        error.textContent = `不是合法 JSON：${err.message}`;
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
