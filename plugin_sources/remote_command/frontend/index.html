<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>远程命令</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; color: #111827; background: #f8fafc; }
    main { padding: 20px; display: grid; gap: 12px; max-width: 980px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    input, select, textarea { padding: 9px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; width: 100%; }
    textarea { min-height: 120px; font-family: Consolas, monospace; }
    button { width: fit-content; border: 0; border-radius: 8px; background: #2563eb; color: white; padding: 9px 14px; cursor: pointer; }
    pre { padding: 12px; min-height: 180px; overflow: auto; border-radius: 8px; background: #0f172a; color: #e2e8f0; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <main>
    <h2>远程服务器执行命令</h2>
    <div class="grid">
      <input id="host" placeholder="主机">
      <input id="port" type="number" value="22" placeholder="端口">
      <input id="username" placeholder="SSH 用户">
      <input id="password" type="password" placeholder="SSH 密码">
      <select id="becomeMethod"><option value="">不切换 root</option><option value="su">su root</option><option value="sudo">sudo -S</option></select>
      <input id="rootPassword" type="password" placeholder="root/sudo 密码">
    </div>
    <textarea id="command" placeholder="输入要执行的命令"></textarea>
    <button id="run">执行</button>
    <div id="error" class="error"></div>
    <pre id="output"></pre>
  </main>
  <script>
    const plugin_id = 'remote-command';
    const value = id => document.getElementById(id).value;
    document.getElementById('run').onclick = async () => {
      const error = document.getElementById('error');
      const output = document.getElementById('output');
      error.textContent = '';
      output.textContent = '执行中...';
      const method = value('becomeMethod');
      const payload = {
        plugin_id,
        host: {
          host: value('host'),
          port: Number(value('port') || 22),
          username: value('username'),
          password: value('password'),
          auth_type: 'password',
          become: method ? { enabled: true, method, target_user: 'root', password: value('rootPassword') } : null
        },
        command: value('command'),
        timeout_seconds: 30
      };
      try {
        const res = await fetch('/api/platform/ssh/execute', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok || data.success === false) throw new Error(data.detail?.error?.message || data.error?.message || '执行失败');
        output.textContent = `exit_code: ${data.exit_code}\nstdout:\n${data.stdout}\nstderr:\n${data.stderr}`;
      } catch (err) {
        error.textContent = err.message;
        output.textContent = '';
      }
    };
  </script>
</body>
</html>
